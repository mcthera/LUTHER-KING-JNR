<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GALLERY</title>
        <link rel="stylesheet" href="CSS GALLERY/gallerystyle.css">
    </head>
    <body>
        <header>
            <nav class="nav-bar">
            <div class="symbols">
             <img src="P/ad.png" class="symbol1">
             <img src="P/adinkra symbol.png" class="symbol2">
             <img src="P/pic.png" class="symbol3">
            </div>
             <div class="navlinks">
            <a href="index.html">HOME PAGE</a>
            <a href="GALLERY.html">KING'S GALLERY</a>
             </div>
            </nav>
        </header>

        <!--this is for the main part where pictures will be shown-->
        <main class="Gallery">
            <div><h1 class="header">PICTURES OF MR ADINKRA LUTHER KING</h1></div>
            <section class="container">
            <div class="item">
                <img src="P/greenhome.png" class="picright" alt="MLK 2" tabindex="0">
            </div>
            <div class="item">
                <img src="P/a.png" class="apic" alt="MLK 2" tabindex="0">
            </div>
            <div class="item">
                <img src="P/b.png" class="picright" alt="MLK 2" tabindex="0">
            </div>
            <div class="item">
                <img src="P/c.png" class="picright" alt="MLK 2" tabindex="0">
            </div>
             <div class="item">
                <img src="P/e.png" class="picright" alt="MLK 2" tabindex="0">
            </div>
            <div class="item">
                <img src="P/d.png" class="picright" alt="MLK 2" tabindex="0">
            </div>
            </section>
        </main>
        <footer>
            <p>see also</p>
            <div>
                <img src="P/logo.png" class="makphoto" alt="logo">
            </div>
        </footer>

        <!-- Lightbox modal -->
        <div id="lightbox" class="lightbox" aria-hidden="true">
            <button class="lightbox-close" aria-label="Close">×</button>
            <img class="lightbox-img" alt="">
        </div>

        <script>
        // Lightbox functionality: open image on click or Enter key
        (function(){
          const imgs = document.querySelectorAll('.container img');
          const lb = document.getElementById('lightbox');
          const lbImg = lb.querySelector('.lightbox-img');
          const closeBtn = lb.querySelector('.lightbox-close');

          function openLightbox(src, alt){
            lbImg.src = src;
            lbImg.alt = alt || '';
            lb.setAttribute('aria-hidden','false');
            document.body.style.overflow = 'hidden';
            closeBtn.focus();
          }
          function closeLightbox(){
            lb.setAttribute('aria-hidden','true');
            document.body.style.overflow = '';
            lbImg.src = '';
          }

          imgs.forEach(img=>{
            img.style.cursor = 'pointer';
            img.addEventListener('click', ()=> openLightbox(img.src, img.alt));
            img.addEventListener('keydown', e=>{ if(e.key === 'Enter') openLightbox(img.src, img.alt); });
          });

          closeBtn.addEventListener('click', closeLightbox);
          lb.addEventListener('click', e=>{ if(e.target === lb) closeLightbox(); });
          document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeLightbox(); });
        })();
        </script>
    </body>
</html>
