        {
          "@context": "https://schema.org",
          "@type": "CollectionPage",
          "name": "Gallery of Kwame Luther King Junior",

        }
        </script>
    </head>
    <body>
        <header>
            <nav class="nav-bar">
            <div class="symbols">
             <img src="P/ad.png" class="symbol1" alt="Adinkra symbol element">
             <img src="P/adinkra symbol.png" class="symbol2" alt="Adinkra symbol artwork">
             <img src="P/pic.png" class="symbol3" alt="Portrait illustration of Kwame Luther King Junior">
            </div>
             <div class="navlinks">
            <a href="index.html">HOME PAGE</a>
            <a href="GALLERY.html">KING'S GALLERY</a>
             </div>
            </nav>
        </header>

        <!--this is for the main part where pictures will be shown-->
        <main class="Gallery">
            <div><h1 class="header">PICTURES OF MR ADINKRA LUTHER KING</h1></div>
            <section class="container">
            <div class="item">
                <img src="P/greenhome.png" class="picright" alt="Portrait photo of Kwame Luther King Junior" tabindex="0">
            </div>
            <div class="item">
                <img src="P/a.png" class="apic" alt="Kwame Luther King Junior speaking at an event" tabindex="0">
            </div>
            <div class="item">
                <img src="P/b.png" class="picright" alt="Professional portrait of Kwame Luther King Junior" tabindex="0">
            </div>
            <div class="item">
                <img src="P/c.png" class="picright" alt="Kwame Luther King Junior in traditional Ghanaian attire" tabindex="0">
            </div>
             <div class="item">

        <footer>
            <p>see also</p>
            <div>

            </div>
        </footer>

        <!-- Lightbox modal -->
        <div id="lightbox" class="lightbox" aria-hidden="true">
            <button class="lightbox-close" aria-label="Close">×</button>
            <img class="lightbox-img" alt="">
        </div>

        <script>
        // Lightbox functionality: open image on click or Enter key
        (function(){
          const imgs = document.querySelectorAll('.container img');
          const lb = document.getElementById('lightbox');
          const lbImg = lb.querySelector('.lightbox-img');
          const closeBtn = lb.querySelector('.lightbox-close');

          function openLightbox(src, alt){
            lbImg.src = src;
            lbImg.alt = alt || '';
            lb.setAttribute('aria-hidden','false');
            document.body.style.overflow = 'hidden';
            closeBtn.focus();
          }
          function closeLightbox(){
            lb.setAttribute('aria-hidden','true');
            document.body.style.overflow = '';
            lbImg.src = '';
          }

          imgs.forEach(img=>{
            img.style.cursor = 'pointer';
            img.addEventListener('click', ()=> openLightbox(img.src, img.alt));
            img.addEventListener('keydown', e=>{ if(e.key === 'Enter') openLightbox(img.src, img.alt); });
          });

          closeBtn.addEventListener('click', closeLightbox);
          lb.addEventListener('click', e=>{ if(e.target === lb) closeLightbox(); });
          document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeLightbox(); });
        })();
        </script>
    </body>
</html>
